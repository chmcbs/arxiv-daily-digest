<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/static/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/static/favicon.png">
  <title>Papers - ResearchPigeon</title>
  <link rel="stylesheet" href="/static/styles.css?v=83">
</head>
<body data-document-title="Papers">
  <header class="topbar">
    <div class="brand product-lockup">
      <img src="/static/favicon.png" alt="" class="product-icon" width="32" height="32">
      <span class="product-name-text">ResearchPigeon</span>
    </div>
    <div class="row">
      <nav class="topbar-nav" aria-label="Primary">
        <a class="link-btn hidden" href="/digest" data-debug-admin>Dev</a>
        <a class="link-btn" href="/profiles">Profiles</a>
        <a class="link-btn" href="/papers">Papers</a>
        <a class="link-btn" href="/about">About</a>
      </nav>
      <div class="session-menu">
        <button
          type="button"
          id="session-label"
          class="session-menu-trigger"
          aria-label="Account"
          aria-expanded="false"
          aria-haspopup="true"
          disabled
        >
        </button>
        <div class="session-menu-panel hidden">
          <p class="session-menu-email" id="session-email"></p>
          <button type="button" class="session-logout-btn">Logout</button>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="sign-in-shell">
      <section class="hero">
        <h1 class="product-lockup">
          <span class="product-name-text">ResearchPigeon</span>
          <img src="/static/logo.png" alt="" class="product-logo" width="70" height="70">
        </h1>
      </section>

      <div class="signup-body">
        <p class="landing-tagline mono-subtitle">Personalised daily digest for arXiv papers.</p>

        <section id="auth-gate" class="panel signup-panel hidden">
        <h2>Sign in to view papers</h2>
        <form id="auth-form" class="stack">
          <input id="auth-email" type="email" placeholder="email@example.com" required aria-label="Email">
          <button type="submit">Send magic link</button>
        </form>
        <p id="auth-status" class="status"></p>
        <p id="auth-link-wrap" class="hidden">
          Dev magic link:
          <a id="auth-link" href="#">open papers</a>
        </p>
      </section>
      </div>
    </div>

    <section id="feedback-app" class="hidden">
      <div class="section-header">
        <h1>Papers</h1>
        <div class="row">
          <button
            id="debug-reset-db-btn"
            type="button"
            class="danger hidden"
            data-debug-admin
            title="Admin only: requires ALLOW_DEBUG_FEATURES and DEBUG_ADMIN_EMAILS; deletes all papers, runs, picks, and feedback; resets preference embeddings to initial interest"
          >
            Hard reset papers (debug)
          </button>
        </div>
      </div>
      <p class="muted feedback-hub-intro hidden">Rate papers to improve recommendation quality.</p>
      <div class="feedback-hub-filters hidden">
        <div class="feedback-profile-filter">
          <span class="feedback-profile-filter-label">Profiles</span>
          <div id="profile-filter-chips" class="feedback-profile-filter-chips"></div>
        </div>
        <div class="feedback-profile-filter">
          <span class="feedback-profile-filter-label">Date</span>
          <div id="date-filter-chips" class="feedback-profile-filter-chips"></div>
        </div>
      </div>
      <p id="feedback-hub-empty" class="muted feedback-hub-empty-state hidden">
        Papers from your daily digest will show up here.
      </p>
      <p id="feedback-status" class="status"></p>
      <div class="feedback-hub-layout is-nav-hidden">
        <nav class="feedback-hub-nav hidden" aria-label="Paper sections">
          <a class="feedback-hub-nav-link is-active" href="#feedback-feed">Feed</a>
          <a class="feedback-hub-nav-link" href="#feedback-liked">Liked</a>
          <a class="feedback-hub-nav-link" href="#feedback-disliked">Disliked</a>
        </nav>
        <div class="feedback-hub-stack">
          <div id="feedback-feed" class="panel feedback-hub-column hidden">
            <button
              type="button"
              class="feedback-hub-toggle"
              aria-expanded="true"
              aria-controls="feed-list"
            >
              <span class="feedback-hub-toggle-label">🆕 Feed</span>
              <span class="feedback-hub-toggle-icon" aria-hidden="true">▾</span>
            </button>
            <div id="feed-list" class="feedback-hub-list feedback-hub-panel-body"></div>
          </div>
          <div id="feedback-liked" class="panel feedback-hub-column hidden">
            <button
              type="button"
              class="feedback-hub-toggle"
              aria-expanded="true"
              aria-controls="liked-list"
            >
              <span class="feedback-hub-toggle-label">👍 Liked</span>
              <span class="feedback-hub-toggle-icon" aria-hidden="true">▾</span>
            </button>
            <div id="liked-list" class="feedback-hub-list feedback-hub-panel-body"></div>
          </div>
          <div id="feedback-disliked" class="panel feedback-hub-column hidden">
            <button
              type="button"
              class="feedback-hub-toggle"
              aria-expanded="true"
              aria-controls="disliked-list"
            >
              <span class="feedback-hub-toggle-label">👎 Disliked</span>
              <span class="feedback-hub-toggle-icon" aria-hidden="true">▾</span>
            </button>
            <div id="disliked-list" class="feedback-hub-list feedback-hub-panel-body"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/site.js"></script>
  <script src="/static/api-client.js"></script>
  <script src="/static/auth-ui.js"></script>
  <script src="/static/format.js?v=9"></script>
  <script src="/static/feedback.js?v=19"></script>
</body>
</html>
