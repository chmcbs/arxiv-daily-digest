<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/static/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/static/favicon.png">
  <title>Dev - ResearchPigeon</title>
  <link rel="stylesheet" href="/static/styles.css?v=83">
</head>
<body data-document-title="Dev">
  <header class="topbar">
    <div class="brand product-lockup">
      <img src="/static/favicon.png" alt="" class="product-icon" width="32" height="32">
      <span class="product-name-text">ResearchPigeon</span>
    </div>
    <div class="row">
      <nav class="topbar-nav" aria-label="Primary">
        <a class="link-btn hidden" href="/digest" data-debug-admin>Dev</a>
        <a class="link-btn" href="/profiles">Profiles</a>
        <a class="link-btn" href="/papers">Papers</a>
        <a class="link-btn" href="/about">About</a>
      </nav>
      <div class="session-menu">
        <button
          type="button"
          id="session-label"
          class="session-menu-trigger"
          aria-label="Account"
          aria-expanded="false"
          aria-haspopup="true"
          disabled
        >
        </button>
        <div class="session-menu-panel hidden">
          <p class="session-menu-email" id="session-email"></p>
          <button type="button" class="session-logout-btn">Logout</button>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="sign-in-shell">
      <section class="hero">
        <h1 class="product-lockup">
          <span class="product-name-text">ResearchPigeon</span>
          <img src="/static/logo.png" alt="" class="product-logo" width="70" height="70">
        </h1>
      </section>

      <div class="signup-body">
        <p class="landing-tagline mono-subtitle">Personalised daily digest for arXiv papers.</p>

        <section id="auth-gate" class="panel signup-panel hidden">
          <h2>Sign in to preview digest</h2>
          <form id="auth-form" class="stack">
            <input id="auth-email" type="email" placeholder="email@example.com" required aria-label="Email">
            <button type="submit">Send magic link</button>
          </form>
          <p id="auth-status" class="status"></p>
          <p id="auth-link-wrap" class="hidden">
            Dev magic link:
            <a id="auth-link" href="#">open digest preview</a>
          </p>
        </section>
      </div>
    </div>

    <section id="digest-app" class="hidden">
      <div class="section-header">
        <h1>Dev</h1>
        <div class="row">
          <button id="generate-btn" type="button">Generate new digest</button>
        </div>
      </div>
      <p id="digest-status" class="status"></p>
      <div class="panel digest-preview-card hidden">
        <div class="digest-preview-header">
          <img src="/static/logo.png" alt="" class="product-logo digest-preview-logo" width="70" height="70">
          <h2 class="digest-preview-title">Your daily digest from <span class="product-name-text">ResearchPigeon</span></h2>
          <span id="digest-preview-date" class="digest-preview-date hidden"></span>
        </div>
        <div id="sections-wrap" class="digest-sections"></div>
        <div class="digest-feedback-cta">
          <div class="digest-feedback-cta-buttons">
            <a class="digest-feedback-cta-btn" href="/papers">Rate papers</a>
            <a class="digest-feedback-cta-btn" href="/profiles">Manage profiles</a>
          </div>
        </div>
      </div>
      <p class="digest-preview-disclaimer muted tiny hidden">
        Papers sourced from <span class="digest-source-domain">arxiv.org</span>
      </p>
    </section>
  </main>

  <template id="section-template">
    <article class="digest-section">
      <div class="row between">
        <h2 class="digest-section-title"></h2>
        <span class="muted digest-category"></span>
      </div>
      <ul class="digest-picks"></ul>
    </article>
  </template>

  <script src="/static/site.js"></script>
  <script src="/static/api-client.js"></script>
  <script src="/static/auth-ui.js"></script>
  <script src="/static/format.js?v=9"></script>
  <script src="/static/digest.js?v=24"></script>
</body>
</html>
