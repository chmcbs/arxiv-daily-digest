<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Digest - arXiv Assistant</title>
  <link rel="stylesheet" href="/static/styles.css?v=7">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">arXiv Assistant</a>
    <div class="row">
      <span id="session-label" class="muted">Checking session...</span>
      <a class="link-btn" href="/preferences">Profiles</a>
      <a class="link-btn" href="/digest">Digest</a>
      <a class="link-btn" href="/feedback">Feedback</a>
    </div>
  </header>

  <main class="container">
    <section id="auth-gate" class="panel hidden">
      <h1>Daily Digest Preview</h1>
      <p class="muted">Sign in by email to preview your daily digest.</p>
      <form id="auth-form" class="stack">
        <label for="auth-email">Email</label>
        <input id="auth-email" type="email" placeholder="you@example.com" required>
        <button type="submit">Send magic link</button>
      </form>
      <p id="auth-status" class="status muted"></p>
      <p id="auth-link-wrap" class="hidden">
        Dev magic link:
        <a id="auth-link" href="#">open digest preview</a>
      </p>
    </section>

    <section id="digest-app" class="hidden">
      <div class="section-header">
        <h1>Daily Digest Preview</h1>
        <div class="row">
          <button id="generate-btn" type="button">Generate new digest</button>
          <button
            id="debug-reset-db-btn"
            type="button"
            class="danger"
            title="Requires env ALLOW_DEBUG_DIGEST_DATA_RESET=1; deletes all papers, runs, picks, and feedback"
          >
            Hard reset papers (debug)
          </button>
        </div>
      </div>
      <p id="digest-status" class="status muted"></p>
      <div id="sections-wrap" class="stack"></div>
      <div class="digest-feedback-cta">
        <a class="digest-feedback-cta-btn" href="/feedback">Give feedback to improve recommendation quality &rarr;</a>
      </div>
    </section>
  </main>

  <template id="section-template">
    <article class="panel digest-section">
      <div class="row between">
        <h2 class="digest-section-title"></h2>
        <span class="tiny muted digest-category"></span>
      </div>
      <ul class="digest-picks"></ul>
    </article>
  </template>

  <script src="/static/api-client.js"></script>
  <script src="/static/auth-ui.js"></script>
  <script src="/static/format.js"></script>
  <script src="/static/digest.js?v=14"></script>
</body>
</html>
