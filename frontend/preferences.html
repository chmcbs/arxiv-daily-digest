<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Preferences - arXiv Assistant</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">arXiv Assistant</a>
    <div class="row">
      <span id="session-label" class="muted">Checking session...</span>
      <a class="link-btn" href="/preferences">Profiles</a>
      <a class="link-btn" href="/digest">Digest</a>
      <a class="link-btn" href="/feedback">Feedback</a>
    </div>
  </header>

  <main class="container">
    <section id="auth-gate" class="panel hidden">
      <h1>Preferences</h1>
      <p class="muted">Sign in by email to edit your profiles.</p>
      <form id="auth-form" class="stack">
        <label for="auth-email">Email</label>
        <input id="auth-email" type="email" placeholder="you@example.com" required>
        <button type="submit">Send magic link</button>
      </form>
      <p id="auth-status" class="status muted"></p>
      <p id="auth-link-wrap" class="hidden">
        Dev magic link:
        <a id="auth-link" href="#">open preferences</a>
      </p>
    </section>

    <section id="prefs-app" class="hidden">
      <div class="section-header">
        <h1>Profiles</h1>
        <div class="row">
          <button id="add-profile-btn">+ Add profile</button>
          <button
            id="debug-reset-profiles-btn"
            type="button"
            class="danger"
            title="Requires env ALLOW_DEBUG_DIGEST_DATA_RESET=1; deletes all profiles, preferences, and keywords (every user)"
          >
            Hard reset profiles (debug)
          </button>
        </div>
      </div>
      <p id="prefs-status" class="status muted"></p>
      <div id="profiles-grid" class="profiles-grid"></div>
    </section>
  </main>

  <template id="profile-card-template">
    <article class="profile-card">
      <div class="row between">
        <div class="row profile-header-meta">
          <input class="profile-title-input" type="text" maxlength="60" aria-label="Profile name">
          <label class="checkbox-row active-toggle">
            <input class="digest-checkbox" type="checkbox">
            Active
          </label>
        </div>
        <div class="row">
          <button class="edit-btn" type="button">Edit profile</button>
          <button class="danger delete-btn hidden" type="button">Delete</button>
        </div>
      </div>

      <label class="category-label">Category</label>
      <select class="category-select"></select>

      <label class="interest-label">Description</label>
      <textarea class="interest-text" rows="2" readonly></textarea>

      <div class="profile-summary">
        <p class="summary-line summary-category"></p>
        <p class="summary-line summary-description"></p>
      </div>

      <div class="keyword-list"></div>

      <button class="feedback-toggle hidden" type="button">Show papers</button>
      <div class="feedback-panel hidden">
        <div class="feedback-list"></div>
      </div>

      <div class="row end card-actions">
        <button class="save-btn hidden" type="button">Save profile</button>
        <button class="cancel-edit-btn hidden" type="button">Cancel</button>
      </div>
    </article>
  </template>

  <script src="/static/api-client.js"></script>
  <script src="/static/auth-ui.js"></script>
  <script src="/static/format.js"></script>
  <script src="/static/preferences.js?v=16"></script>
</body>
</html>
