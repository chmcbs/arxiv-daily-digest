<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/static/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/static/favicon.png">
  <title>Profiles - ResearchPigeon</title>
  <link rel="stylesheet" href="/static/styles.css?v=83">
</head>
<body data-document-title="Profiles">
  <header class="topbar">
    <div class="brand product-lockup">
      <img src="/static/favicon.png" alt="" class="product-icon" width="32" height="32">
      <span class="product-name-text">ResearchPigeon</span>
    </div>
    <div class="row">
      <nav class="topbar-nav" aria-label="Primary">
        <a class="link-btn hidden" href="/digest" data-debug-admin>Dev</a>
        <a class="link-btn" href="/profiles">Profiles</a>
        <a class="link-btn" href="/papers">Papers</a>
        <a class="link-btn" href="/about">About</a>
      </nav>
      <div class="session-menu">
        <button
          type="button"
          id="session-label"
          class="session-menu-trigger"
          aria-label="Account"
          aria-expanded="false"
          aria-haspopup="true"
          disabled
        >
        </button>
        <div class="session-menu-panel hidden">
          <p class="session-menu-email" id="session-email"></p>
          <button type="button" class="session-logout-btn">Logout</button>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="sign-in-shell">
      <section class="hero">
        <h1 class="product-lockup">
          <span class="product-name-text">ResearchPigeon</span>
          <img src="/static/logo.png" alt="" class="product-logo" width="70" height="70">
        </h1>
      </section>

      <div class="signup-body">
        <p class="landing-tagline mono-subtitle">Personalised daily digest for arXiv papers.</p>

        <section id="auth-gate" class="panel signup-panel hidden">
        <h2>Sign in to manage profiles</h2>
        <form id="auth-form" class="stack">
          <input id="auth-email" type="email" placeholder="email@example.com" required aria-label="Email">
          <button type="submit">Send magic link</button>
        </form>
        <p id="auth-status" class="status"></p>
        <p id="auth-link-wrap" class="hidden">
          Dev magic link:
          <a id="auth-link" href="#">open profiles</a>
        </p>
      </section>
      </div>
    </div>

    <section id="prefs-app" class="hidden">
      <div class="section-header">
        <h1>Profiles</h1>
        <div class="row">
          <button
            id="debug-reset-profiles-btn"
            type="button"
            class="danger hidden"
            data-debug-admin
            title="Admin only: requires ALLOW_DEBUG_FEATURES and DEBUG_ADMIN_EMAILS; deletes all profiles, preferences, and keywords"
          >
            Hard reset profiles (debug)
          </button>
          <button id="add-profile-btn">+ Add profile</button>
        </div>
      </div>
      <section class="panel email-settings-panel hidden">
        <label class="checkbox-row digest-emails-toggle">
          <input id="digest-emails-toggle" type="checkbox" checked>
          Enable daily digest emails
        </label>
      </section>
      <div id="profiles-grid" class="profiles-grid"></div>
      <p id="prefs-empty" class="muted prefs-empty-state hidden">
        No profiles yet. Add your first profile!
      </p>
      <p id="prefs-status" class="status"></p>
      <p class="profiles-order-tip muted hidden">Tip: rearrange profiles to change their order in your daily digest!</p>
    </section>
  </main>

  <template id="profile-card-template">
    <article class="profile-card">
      <div class="row between">
        <div class="row profile-header-meta">
          <span
            class="profile-drag-handle hidden"
            role="button"
            tabindex="0"
            aria-label="Drag to reorder"
            title="Drag to reorder"
          >⋮⋮</span>
          <input class="profile-title-input" type="text" maxlength="60" aria-label="Profile name">
          <label class="checkbox-row active-toggle">
            <input class="digest-checkbox" type="checkbox">
            Active
          </label>
        </div>
        <div class="row profile-header-actions">
          <button class="edit-btn" type="button">Edit profile</button>
          <button class="save-btn hidden" type="button">Save profile</button>
          <button class="cancel-edit-btn hidden" type="button">Cancel</button>
        </div>
      </div>

      <label class="category-label">Category</label>
      <select class="category-select"></select>

      <label class="interest-label">Description</label>
      <textarea class="interest-text" rows="2" readonly></textarea>

      <div class="profile-summary">
        <p class="summary-line summary-category"></p>
        <p class="summary-line summary-description"></p>
      </div>

      <div class="profile-form-footer">
        <div class="keyword-list"></div>
        <div class="row end draft-actions"></div>
      </div>

      <div class="profile-card-bottom">
        <button class="feedback-toggle hidden" type="button">Show papers</button>
        <button class="danger delete-btn hidden" type="button">Delete</button>
      </div>
      <div class="feedback-panel hidden">
        <div class="feedback-list"></div>
      </div>
    </article>
  </template>

  <script src="/static/site.js"></script>
  <script src="/static/api-client.js"></script>
  <script src="/static/auth-ui.js"></script>
  <script src="/static/format.js?v=9"></script>
  <script src="/static/preferences.js?v=22"></script>
</body>
</html>
