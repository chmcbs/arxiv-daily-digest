services:
  db:
    image: pgvector/pgvector:pg16
    container_name: arxiv-assistant-db
    environment:
      POSTGRES_DB: arxiv_assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d arxiv_assistant"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: arxiv-assistant-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mailpit:
    image: axllent/mailpit:latest
    container_name: arxiv-assistant-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  api:
    build: .
    container_name: arxiv-assistant-api
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/arxiv_assistant
      INTERNAL_CRON_TOKEN: ${INTERNAL_CRON_TOKEN:?INTERNAL_CRON_TOKEN is required}
      DEBUG_ADMIN_EMAILS: ${DEBUG_ADMIN_EMAILS:-}
      ALLOW_DEV_MAGIC_LINK_RESPONSE: ${ALLOW_DEV_MAGIC_LINK_RESPONSE:-1}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
      ALLOW_DEBUG_FEATURES: ${ALLOW_DEBUG_FEATURES:-0}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434}
      LLM_MODEL: ${LLM_MODEL:-llama3.2:3b}
      LLM_BATCH_CONCURRENCY: ${LLM_BATCH_CONCURRENCY:-1}
      LLM_BATCH_TIMEOUT_S: ${LLM_BATCH_TIMEOUT_S:-600}
      LLM_REQUEST_TIMEOUT_S: ${LLM_REQUEST_TIMEOUT_S:-120}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@localhost}
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
      mailpit:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build: .
    container_name: arxiv-assistant-worker
    env_file:
      - path: .env
        required: false
    entrypoint: ["/worker-entrypoint.sh"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/arxiv_assistant
      APP_BASE_URL: http://api:8000
      INTERNAL_CRON_TOKEN: ${INTERNAL_CRON_TOKEN}
      CRON_INTERVAL_SECONDS: ${CRON_INTERVAL_SECONDS:-86400}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  postgres_data:
  ollama_data:
