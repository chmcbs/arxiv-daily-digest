name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql://pytest:pytest@127.0.0.1:9/pytest
        run: pytest tests/ -q

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Compile Python sources
        run: python -m compileall -q api core

      - name: Verify API application imports
        run: python -c "from api import app; assert app.title"

      - name: Validate production startup configuration
        run: |
          APP_ENV=production \
          DATABASE_URL=postgresql://postgres:postgres@db:5432/arxiv \
          APP_BASE_URL=https://app.example.com \
          INTERNAL_CRON_TOKEN=test-cron-token-thirty-two-characters-long \
          SMTP_HOST=smtp.example.com \
          EMAIL_FROM=noreply@example.com \
          EMAIL_UNSUBSCRIBE_SECRET=test-unsubscribe-secret-thirty-two-chars \
          ALLOW_DEV_MAGIC_LINK_RESPONSE=0 \
          python -c "from core.startup import validate_runtime_config; validate_runtime_config()"

      - name: Validate Docker Compose configuration
        env:
          INTERNAL_CRON_TOKEN: test-cron-token-thirty-two-characters-long
          APP_BASE_URL: https://app.example.com
          SMTP_HOST: smtp.example.com
          EMAIL_FROM: noreply@example.com
        run: |
          # .env is gitignored; compose still references it via env_file.
          touch .env
          docker compose config --quiet
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet
